name: bettencourt-pos

services:
  app:
    build: .
    container_name: kt-bettencourt-pos
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: https://pos.karetechsolutions.com
      CORS_ORIGIN: https://pos.karetechsolutions.com
      VITE_SERVER_URL: https://pos.karetechsolutions.com
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kt-net-apps
      - kt-net-databases
      - pangolin

networks:
  kt-net-apps:
    external: true
  kt-net-databases:
    external: true
  pangolin:
    external: true
