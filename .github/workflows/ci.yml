name: CI / Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs for the same branch/PR to save runner minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Type-check and lint on GitHub-hosted runners (no infra required)
  # ─────────────────────────────────────────────────────────────────────────────
  check:
    name: Type Check & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache bun install across runs
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: TypeScript type check
        run: bun run check-types

      - name: Test suite
        run: bun run test

      - name: Production build
        # Exclude fumadocs: its prerender config uses node:fs/promises.glob() which
        # Vite's SSR virtual-module evaluator cannot resolve in the CI environment.
        # Fumadocs is a static docs site — the POS app (web + server) is what we deploy.
        run: bunx turbo build --filter="!fumadocs"

      - name: Biome lint & format check
        # biome ci = read-only CI mode (no --write, strict exit codes)
        run: bunx @biomejs/biome ci .

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy on push to master (runs on production host via self-hosted runner)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: self-hosted
    needs: [check]
    # Only deploy when pushing directly to master (not on PRs)
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # Copy the production .env already on Titan — single source of truth for secrets.
      - name: Create environment file
        run: cp /home/karetech/projects/bettencourt/Bettencourt-POS/.env .env

      # Build new image and restart container.
      # Docker layer caching persists on the self-hosted runner between builds,
      # so the bun install layer is typically cached (fast rebuilds ~30s vs ~2m).
      - name: Build and deploy
        run: docker compose -f docker-compose.prod.yml --env-file .env up -d --build

      # Wait for the container to be running and have logged "Started server".
      # Port 3000 is not host-bound (distroless, pangolin-only) so curl localhost
      # won't work — use docker inspect + log grep instead.
      - name: Verify deployment health
        run: |
          echo "Waiting for server to be healthy..."
          for i in $(seq 1 12); do
            status=$(docker inspect --format='{{.State.Status}}' kt-bettencourt-pos 2>/dev/null || echo "not-found")
            if [ "$status" = "running" ] && docker logs kt-bettencourt-pos 2>&1 | grep -q "Started server"; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i/12 — container status: $status, waiting 5s..."
            sleep 5
          done
          echo "Health check failed after 60s"
          docker compose -f docker-compose.prod.yml logs --tail=50
          exit 1

      - name: Verify public FQDN health
        env:
          PUBLIC_HEALTH_URL: https://pos.karetechsolutions.com/health
        run: |
          echo "Checking public endpoint: $PUBLIC_HEALTH_URL"
          for i in $(seq 1 12); do
            if curl -fsS "$PUBLIC_HEALTH_URL" > /dev/null; then
              echo "Public health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i/12 failed, waiting 5s..."
            sleep 5
          done
          echo "Public health check failed after 60s"
          exit 1

      # Remove dangling (<none>) images left after rebuilds to reclaim disk space
      - name: Prune dangling images
        if: always()
        run: docker image prune -f

      # Always clean up the env file — even if a previous step failed
      - name: Remove environment file
        if: always()
        run: rm -f .env
